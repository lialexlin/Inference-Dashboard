# Daily refresh + commit for cloud deploy.
#
# Regenerates data/*.json every morning and commits the diff back to main.
# GitHub Pages then serves the static site at:
#   https://lialexlin.github.io/Inference-Dashboard
#
# Stages: CIQ → prices → RSS → EDGAR (see jobs/refresh.py).
# CIQ stage needs SF_ACCOUNT/SF_USER/SF_PASS as repo secrets
# (Settings → Secrets and variables → Actions). Without them the stage
# logs a connect error and preserves prior ciq.* blocks; other stages
# still run.
#
# Manual run: Actions → refresh-data → Run workflow.

name: refresh-data
on:
  schedule:
    - cron: "0 22 * * 1-5"  # 22:00 UTC ≈ 6pm ET (EDT) / 5pm ET (EST), weekdays only — runs after US market close so yfinance has the day's closing prints
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install
        run: pip install -e .
      - name: Refresh data
        env:
          SF_ACCOUNT: ${{ secrets.SF_ACCOUNT }}
          SF_USER: ${{ secrets.SF_USER }}
          SF_PASS: ${{ secrets.SF_PASS }}
        run: python -m jobs.refresh
      - name: Commit changes
        run: |
          git config user.name  "inference-dashboard-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ || true
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Daily data refresh ($(date -u +%Y-%m-%d))"
            git push
          fi
