# Twice-daily refresh + commit for cloud deploy.
#
# Regenerates data/*.json and commits the diff back to main.
# GitHub Pages then serves the static site at:
#   https://lialexlin.github.io/Inference-Dashboard
#
# Stage order (see jobs/refresh.py):
#   CIQ → prices → RSS → EDGAR → transcripts → narrative → transform/tag
#   → bottleneck → openrouter → scoring → exit_triggers → tw_universe → us_universe
#
# CIQ stage needs SF_ACCOUNT/SF_USER/SF_PASS as repo secrets
# (Settings → Secrets and variables → Actions). Without them the stage
# logs a connect error and preserves prior ciq.* blocks; other stages
# still run.
#
# Runs twice every day (incl. weekends), both times the full chain:
#   • 09:00 UTC (17:00 Taipei) — after TWSE+TPEx close & post, so the
#     tw_movers radar + .TW/.TWO player closes are the day's prints.
#     ~3.5h buffer because TPEx daily quotes lag TWSE by hours.
#   • 22:00 UTC (~6pm ET) — after US market close, so yfinance has the
#     US day's closing prints.
# Off-session stages (CIQ/RSS/EDGAR/transcripts) simply re-store prior
# values on the run where their market is shut — harmless; every stage
# preserves prior output on failure.
#
# Manual run: Actions → refresh-data → Run workflow.

name: refresh-data
on:
  schedule:
    - cron: "0 9 * * *"   # 09:00 UTC = 17:00 Taipei — after TWSE+TPEx close & post
    - cron: "0 22 * * *"  # 22:00 UTC ≈ 6pm ET (EDT) / 5pm ET (EST) — after US market close
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install
        run: pip install -e .
      - name: Refresh data
        env:
          SF_ACCOUNT: ${{ secrets.SF_ACCOUNT }}
          SF_USER: ${{ secrets.SF_USER }}
          SF_PASS: ${{ secrets.SF_PASS }}
        run: python -m jobs.refresh
      - name: Commit changes
        run: |
          git config user.name  "inference-dashboard-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ || true
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Data refresh ($(date -u '+%Y-%m-%d %H:%MZ'))"
            git push
          fi
