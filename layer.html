<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Layer detail · Inference Stack</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="min-h-screen">
  <div id="header"></div>

  <main class="max-w-7xl mx-auto px-6 py-10">
    <div id="content"></div>
  </main>

  <script src="assets/app.js"></script>
  <script src="assets/components.js"></script>
  <script>
    (async () => {
      await loadAll();
      document.getElementById("header").innerHTML = shellHeader("overview");

      const id = qs("id");
      const layer = layerById(id);
      const root = document.getElementById("content");
      if (!layer) {
        root.innerHTML = `<div class="text-center py-24 text-[color:var(--text-faint)]">Layer not found. <a class="underline" href="index.html">Back to overview</a>.</div>`;
        return;
      }

      const players = playersForLayer(id);
      const recentSignals = (DATA.signals || [])
        .filter((s) => (s.layer_ids || []).includes(id))
        .slice(0, 12);

      const sources = (layer.key_sources || []).map((s) =>
        `<a href="${s.url}" target="_blank" rel="noopener" class="block text-sm text-[color:var(--sky)] hover:underline mb-1">${escapeHtml(s.name)} <span class="text-[color:var(--text-faint)]">↗</span></a>`
      ).join("");

      // Markdown content fetch
      const mdPath = `content/layers/${String(layer.order).padStart(2, "0")}-${layer.id}.md`;
      let mdBody = "";
      try {
        const r = await fetch(mdPath);
        if (r.ok) mdBody = await r.text();
      } catch (e) {}

      root.innerHTML = `
        <a href="index.html" class="text-xs text-[color:var(--text-faint)] hover:text-[color:var(--text-dim)]">← back to stack overview</a>

        <header class="mt-4 mb-8 flex items-start justify-between gap-6 flex-wrap">
          <div>
            <div class="text-xs uppercase tracking-widest text-[color:var(--text-faint)] mb-3">Layer ${layer.order} of 15</div>
            <h1 class="font-display text-5xl text-white leading-tight max-w-3xl">${layer.name}</h1>
            <p class="mt-3 text-[color:var(--text-dim)] max-w-2xl">${layer.short_role}</p>
          </div>
          <div class="flex items-center gap-2">
            <span class="badge badge--${layer.status}" title="${escapeHtml(statusDefinition(layer.status))}">${statusLabel(layer.status)}</span>
            ${layer.status_override ? `<span class="badge-hint">manual</span>` : `<span class="badge-hint">auto</span>`}
          </div>
        </header>

        <section class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-10">
          <div class="lg:col-span-2 layer-card">
            <div class="text-xs uppercase tracking-widest text-[color:var(--text-faint)] mb-2">Bottleneck status</div>
            <p class="text-[15px] text-[color:var(--text)] leading-relaxed">${escapeHtml(layer.bottleneck_summary)}</p>
            <p class="mt-3 text-sm text-[color:var(--text-dim)] italic">${escapeHtml(layer.status_note)}</p>
            <div id="quadrant-distribution" class="mt-4 pt-4 border-t border-[color:var(--border-soft)]"></div>
          </div>
          <div class="layer-card">
            <div class="text-xs uppercase tracking-widest text-[color:var(--text-faint)] mb-2">Primary sources</div>
            <div>${sources || '<div class="text-sm text-[color:var(--text-faint)]">—</div>'}</div>
          </div>
        </section>

        <div class="section-divider">Business × Valuation map</div>
        <section class="layer-card mb-10">
          <div class="flex items-baseline justify-between mb-3 flex-wrap gap-2">
            <div class="text-xs text-[color:var(--text-dim)]">Each dot is a player in this layer. Right = stronger business (growth, margins). Up = cheaper (multiples vs own history & peers). Top-right is the underappreciated zone.</div>
            <div class="text-[10px] uppercase tracking-widest text-[color:var(--text-faint)]">z-scored within layer</div>
          </div>
          <div id="quadrant-chart" style="height: 380px;"></div>
          <div id="quadrant-chart-empty" class="hidden text-sm text-[color:var(--text-faint)] py-4">Not enough scored players in this layer to plot.</div>
        </section>

        <div class="section-divider">What it does</div>
        <section class="markdown"></section>

        <div class="section-divider">Players (${players.length})</div>
        <section>
          <table class="players">
            <thead>
              <tr>
                <th>Ticker</th><th>Company</th><th class="hidden md:table-cell">Role</th>
                <th class="text-right">Last</th>
                <th class="text-right">1m</th>
                <th class="text-right">6m</th>
                <th class="text-right">YTD</th>
                <th class="text-right hidden md:table-cell">Mkt cap</th>
                <th class="text-right hidden md:table-cell" title="Forward P/E from yfinance (consensus EPS)">P/E fwd</th>
                <th class="text-right hidden lg:table-cell" title="Trailing EV/EBITDA — S&P Capital IQ">EV/EBITDA</th>
                <th class="text-right hidden lg:table-cell" title="Price/Sales — S&P Capital IQ">P/S</th>
                <th class="text-right hidden lg:table-cell" title="EBITDA margin (latest fiscal year) — S&P Capital IQ">EBITDA mgn</th>
                <th class="text-right hidden lg:table-cell" title="Revenue YoY (latest fiscal year) — S&P Capital IQ">Rev YoY</th>
                <th class="text-right hidden xl:table-cell" title="Business score — composite of growth, acceleration, margin, signal density, and EPS revisions (if manual estimates provided). Z-scored within this layer's peer set.">Biz</th>
                <th class="text-right hidden xl:table-cell" title="Valuation score — composite of multiple vs own history, vs peers, and price run. Z-scored. Positive = cheap.">Val</th>
              </tr>
            </thead>
            <tbody id="players-body"></tbody>
          </table>
        </section>

        <div id="chart-host" class="hidden mt-6 layer-card">
          <div class="flex items-center justify-between mb-3">
            <div>
              <span class="text-xs uppercase tracking-widest text-[color:var(--text-faint)]">Selected</span>
              <span id="chart-ticker" class="ml-2 font-mono text-white"></span>
            </div>
            <button id="chart-close" class="btn-ghost">close</button>
          </div>
          <div id="chart" style="height: 280px;"></div>
        </div>

        <div class="section-divider">Recent signals (last ${recentSignals.length})</div>
        <section id="signals" class="grid gap-3"></section>
        ${recentSignals.length === 0 ? '<div class="text-sm text-[color:var(--text-faint)] py-4">No tagged signals yet for this layer — check back after the next refresh.</div>' : ''}
      `;

      // Render markdown
      if (mdBody) {
        document.querySelector("section.markdown").innerHTML = marked.parse(mdBody);
      } else {
        document.querySelector("section.markdown").innerHTML = '<p class="text-sm text-[color:var(--text-faint)]">Long-form content pending.</p>';
      }

      // Players table
      const tbody = document.getElementById("players-body");
      tbody.innerHTML = players.map((p) => {
        const px = DATA.prices[p.ticker] || {};
        const f = DATA.fundamentals[p.ticker] || {};
        const ciq = f.ciq || {};
        const score = f.score || null;
        const q = (score && score.quadrant) || "unscored";
        const c1 = px.change_1m, c6 = px.change_6m, cy = px.change_ytd;
        // Prefer CIQ market cap (currency-aware via reporting currency) over yfinance's.
        const mcap = ciq.market_cap_usd ?? f.market_cap_usd ?? (f.currency === "USD" ? f.market_cap : null);
        const qpill = `<span class="qpill qpill--${q}" title="${escapeHtml(quadrantLabel(q) + ' — ' + quadrantDefinition(q))}">${escapeHtml(quadrantLabel(q))}</span>`;
        return `
          <tr data-ticker="${p.ticker}" class="cursor-pointer">
            <td><div class="flex items-center gap-2 flex-wrap"><a class="ticker text-white hover:text-[color:var(--sky)] hover:underline underline-offset-2" href="stock.html?ticker=${encodeURIComponent(p.ticker)}" data-stock-link>${p.ticker}</a>${qpill}</div></td>
            <td><div class="text-white">${escapeHtml(p.name)}</div><div class="text-xs text-[color:var(--text-faint)]">${escapeHtml(p.exchange)} · ${escapeHtml(p.country)}</div></td>
            <td class="text-sm text-[color:var(--text-dim)] hidden md:table-cell max-w-md">${escapeHtml(p.role)}</td>
            <td class="num text-right">${fmtPrice(px.last_close, px.currency)}</td>
            <td class="num text-right ${changeClass(c1) === 'up' ? 'text-[color:var(--green)]' : changeClass(c1) === 'dn' ? 'text-[color:var(--rose)]' : 'text-[color:var(--text-faint)]'}">${fmtPct(c1)}</td>
            <td class="num text-right ${changeClass(c6) === 'up' ? 'text-[color:var(--green)]' : changeClass(c6) === 'dn' ? 'text-[color:var(--rose)]' : 'text-[color:var(--text-faint)]'}">${fmtPct(c6)}</td>
            <td class="num text-right ${changeClass(cy) === 'up' ? 'text-[color:var(--green)]' : changeClass(cy) === 'dn' ? 'text-[color:var(--rose)]' : 'text-[color:var(--text-faint)]'}">${fmtPct(cy)}</td>
            <td class="num text-right text-[color:var(--text-dim)] hidden md:table-cell">${fmtMcap(mcap)}</td>
            <td class="num text-right text-[color:var(--text-dim)] hidden md:table-cell">${fmtPE(f.pe_forward)}</td>
            <td class="num text-right text-[color:var(--text-dim)] hidden lg:table-cell">${fmtMultiple(ciq.ev_ebitda)}</td>
            <td class="num text-right text-[color:var(--text-dim)] hidden lg:table-cell">${fmtMultiple(ciq.p_s)}</td>
            <td class="num text-right text-[color:var(--text-dim)] hidden lg:table-cell">${fmtPct(ciq.ebitda_margin != null ? ciq.ebitda_margin * 100 : null)}</td>
            <td class="num text-right ${changeClass(ciq.revenue_yoy != null ? ciq.revenue_yoy * 100 : null) === 'up' ? 'text-[color:var(--green)]' : changeClass(ciq.revenue_yoy != null ? ciq.revenue_yoy * 100 : null) === 'dn' ? 'text-[color:var(--rose)]' : 'text-[color:var(--text-faint)]'} hidden lg:table-cell">${fmtPct(ciq.revenue_yoy != null ? ciq.revenue_yoy * 100 : null)}</td>
            <td class="text-right hidden xl:table-cell whitespace-nowrap">${renderScoreBar(score ? score.business : null)}</td>
            <td class="text-right hidden xl:table-cell whitespace-nowrap">${renderScoreBar(score ? score.valuation : null)}</td>
          </tr>`;
      }).join("");

      // Quadrant distribution panel below Bottleneck status
      const qcounts = { underappreciated: 0, "priced-in": 0, "value-trap": 0, avoid: 0, fair: 0, unscored: 0 };
      players.forEach((p) => {
        const s = (DATA.fundamentals[p.ticker] || {}).score;
        const q = (s && s.quadrant) || "unscored";
        qcounts[q] = (qcounts[q] || 0) + 1;
      });
      const distEl = document.getElementById("quadrant-distribution");
      if (distEl) {
        const parts = Object.entries(qcounts)
          .filter(([_, n]) => n > 0)
          .map(([q, n]) => `<span class="inline-flex items-center gap-1.5" title="${escapeHtml(quadrantLabel(q) + ' — ' + quadrantDefinition(q))}"><span class="qdot qdot--${q}"></span><span class="text-sm text-[color:var(--text)]">${n}</span> <span class="text-xs text-[color:var(--text-dim)]">${quadrantLabel(q)}</span></span>`)
          .join(`<span class="text-[color:var(--text-faint)] mx-2">·</span>`);
        distEl.innerHTML = `<div class="text-xs uppercase tracking-widest text-[color:var(--text-faint)] mb-2">Players by quadrant</div><div class="flex flex-wrap items-center gap-y-2">${parts}</div>`;
      }

      // Quadrant legend strip lives just above the Players table — full page width.
      const sectionDividers = document.querySelectorAll(".section-divider");
      const playersDivider = Array.from(sectionDividers).find((el) => el.textContent.startsWith("Players ("));
      if (playersDivider) {
        playersDivider.insertAdjacentHTML("afterend", renderQuadrantLegend());
      }

      // Signals
      document.getElementById("signals").innerHTML = recentSignals.map(renderSignalCard).join("");

      // Quadrant scatter — Business (x) × Valuation (y). Render before the price
      // chart so the click handler below can reference renderChart.
      const QUAD_COLORS = {
        underappreciated: "#34d399",
        "priced-in": "#38bdf8",
        "value-trap": "#fbbf24",
        avoid: "#fb7185",
        fair: "#9a9aa6",
      };
      const quadPoints = players.map((p) => {
        const s = (DATA.fundamentals[p.ticker] || {}).score;
        if (!s || s.business == null || s.valuation == null) return null;
        return {
          name: p.ticker,
          value: [s.business, s.valuation],
          itemStyle: { color: QUAD_COLORS[s.quadrant] || QUAD_COLORS.fair, borderColor: "rgba(0,0,0,0.5)", borderWidth: 1 },
          extra: { company: p.name, quadrant: s.quadrant },
        };
      }).filter(Boolean);

      const qEmpty = document.getElementById("quadrant-chart-empty");
      const qEl = document.getElementById("quadrant-chart");
      if (quadPoints.length < 2) {
        qEl.classList.add("hidden");
        qEmpty.classList.remove("hidden");
      } else {
        const absMax = Math.max(2, ...quadPoints.flatMap((p) => p.value.map((v) => Math.abs(v))));
        const axisMax = Math.ceil(absMax * 10) / 10 + 0.2;
        const qChart = echarts.init(qEl, null, { renderer: "canvas" });
        qChart.setOption({
          backgroundColor: "transparent",
          grid: { left: 60, right: 30, top: 30, bottom: 50 },
          xAxis: {
            name: "Business →", nameLocation: "middle", nameGap: 30,
            nameTextStyle: { color: "#9a9aa6", fontSize: 12 },
            min: -axisMax, max: axisMax,
            axisLine: { lineStyle: { color: "#232331" } },
            splitLine: { show: false },
            axisLabel: { color: "#5d5d6a", fontSize: 11 },
          },
          yAxis: {
            name: "Valuation (cheaper →)", nameLocation: "middle", nameGap: 40, nameRotate: 90,
            nameTextStyle: { color: "#9a9aa6", fontSize: 12 },
            min: -axisMax, max: axisMax,
            axisLine: { lineStyle: { color: "#232331" } },
            splitLine: { show: false },
            axisLabel: { color: "#5d5d6a", fontSize: 11 },
          },
          tooltip: {
            backgroundColor: "#15151c", borderColor: "#232331",
            textStyle: { color: "#e8e8ec" },
            formatter: (p) => {
              const d = p.data;
              return `<div style="font-family: ui-monospace, monospace; font-weight: 600;">${escapeHtml(d.name)}</div>
                      <div style="font-size: 11px; color: #9a9aa6; margin-bottom: 4px;">${escapeHtml(d.extra.company)}</div>
                      <div>Biz <strong>${d.value[0] >= 0 ? "+" : ""}${d.value[0].toFixed(2)}</strong></div>
                      <div>Val <strong>${d.value[1] >= 0 ? "+" : ""}${d.value[1].toFixed(2)}</strong></div>
                      <div style="margin-top: 4px; color: ${QUAD_COLORS[d.extra.quadrant] || "#9a9aa6"};">${escapeHtml(quadrantLabel(d.extra.quadrant))}</div>`;
            },
          },
          series: [{
            type: "scatter",
            symbolSize: 14,
            data: quadPoints,
            label: {
              show: true, position: "right", offset: [6, 0],
              color: "#e8e8ec", fontSize: 11,
              fontFamily: "ui-monospace, monospace",
              formatter: (p) => p.data.name,
            },
            markLine: {
              symbol: "none", silent: true,
              lineStyle: { color: "#5d5d6a", type: "dashed", opacity: 0.5 },
              label: { show: false },
              data: [{ xAxis: 0 }, { yAxis: 0 }],
            },
            markArea: {
              silent: true,
              data: [
                [{ name: "Underappreciated", xAxis: 0.3, yAxis: 0.3, itemStyle: { color: "rgba(52,211,153,0.05)" }, label: { color: "rgba(52,211,153,0.5)", position: "insideTopRight", fontSize: 10, fontWeight: 600, distance: 6 } }, { xAxis: "max", yAxis: "max" }],
                [{ name: "Priced-in", xAxis: 0.3, yAxis: -0.3, itemStyle: { color: "rgba(56,189,248,0.05)" }, label: { color: "rgba(56,189,248,0.5)", position: "insideBottomRight", fontSize: 10, fontWeight: 600, distance: 6 } }, { xAxis: "max", yAxis: "min" }],
                [{ name: "Value trap", xAxis: -0.3, yAxis: 0.3, itemStyle: { color: "rgba(251,191,36,0.05)" }, label: { color: "rgba(251,191,36,0.5)", position: "insideTopLeft", fontSize: 10, fontWeight: 600, distance: 6 } }, { xAxis: "min", yAxis: "max" }],
                [{ name: "Avoid", xAxis: -0.3, yAxis: -0.3, itemStyle: { color: "rgba(251,113,133,0.05)" }, label: { color: "rgba(251,113,133,0.5)", position: "insideBottomLeft", fontSize: 10, fontWeight: 600, distance: 6 } }, { xAxis: "min", yAxis: "min" }],
              ],
            },
          }],
        });
        qChart.on("click", (params) => {
          if (params.data && params.data.name) renderChart(params.data.name);
        });
        window.addEventListener("resize", () => qChart.resize());
      }

      // Chart
      const chartHost = document.getElementById("chart-host");
      const chartEl = document.getElementById("chart");
      const chart = echarts.init(chartEl, null, { renderer: "canvas" });
      const renderChart = (ticker) => {
        const px = DATA.prices[ticker];
        if (!px || !px.history) return;
        document.getElementById("chart-ticker").textContent = `${ticker} · ${px.currency} · 1y daily close`;
        chart.setOption({
          grid: { left: 50, right: 20, top: 20, bottom: 30 },
          xAxis: { type: "category", data: px.history.map((h) => h.date), axisLabel: { color: "#9a9aa6", fontSize: 11 }, axisLine: { lineStyle: { color: "#232331" } } },
          yAxis: { type: "value", scale: true, axisLabel: { color: "#9a9aa6", fontSize: 11 }, splitLine: { lineStyle: { color: "#1a1a23" } } },
          tooltip: { trigger: "axis", backgroundColor: "#15151c", borderColor: "#232331", textStyle: { color: "#e8e8ec" } },
          series: [{
            type: "line", smooth: true, symbol: "none",
            data: px.history.map((h) => h.close),
            lineStyle: { width: 1.5, color: "#a78bfa" },
            areaStyle: { color: { type: "linear", x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: "rgba(167,139,250,0.25)" }, { offset: 1, color: "rgba(167,139,250,0)" }] } },
          }],
          backgroundColor: "transparent",
        });
        chartHost.classList.remove("hidden");
        chart.resize();
        chartEl.scrollIntoView({ behavior: "smooth", block: "center" });
      };
      tbody.querySelectorAll("tr[data-ticker]").forEach((tr) => {
        tr.addEventListener("click", (e) => {
          // Ticker text is an <a> to stock.html — let normal navigation happen.
          if (e.target.closest("[data-stock-link]")) return;
          renderChart(tr.getAttribute("data-ticker"));
        });
      });
      document.getElementById("chart-close").addEventListener("click", () => chartHost.classList.add("hidden"));

      // Auto-open chart if URL has #TICKER hash
      const hashTicker = decodeURIComponent((location.hash || "").replace("#", ""));
      if (hashTicker && DATA.prices[hashTicker]) renderChart(hashTicker);

      window.addEventListener("resize", () => chart.resize());
    })();
  </script>
</body>
</html>
